# Remap prefix from C-b to C-a
unbind C-b
set -g prefix C-a
set -g focus-events on
bind C-a send-prefix

# Reload config with prefix-r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Sensible split commands
# '|' and '\' both split horizontally on purpose: same physical key, either shift state works
bind '|' split-window -h
bind '\' split-window -h
bind '-' split-window -v
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift arrows to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# No maus
set -g mouse off

# Bump history limit
set -g history-limit 10000

# 1-index windows and panes, renumber to close gaps when a window is killed
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Minimize ^[ delays
set -s escape-time 0

# Terminal
set -g default-terminal tmux-256color

# vi mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v'      send -X begin-selection
bind-key -T copy-mode-vi 'y'      send -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi 'Enter'  send -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi 'Escape' send -X cancel

# Don't rename windows
set-option -g allow-rename off

#####################
# Pretty status bar #
#####################

set -g status-position bottom
set -g status-justify centre
set -g status-right ""
if-shell -b '[ -f "$HOME/.tmux/kube-tmux/kube.tmux" ]' {
  # https://github.com/jonmosco/kube-tmux
  set -g status-right "#(/bin/bash $HOME/.tmux/kube-tmux/kube.tmux 250 red cyan)"
}
set -g status-left " #S "
setw -g window-status-format "#[fg=green] #I  #W "
setw -g window-status-current-format "#[bg=brightblack]#[fg=brightwhite] #I #[bg=green] #W "
set -g status-bg "#262626"
set -g status-fg white

# Pane Borders
# Dim inactive panes: active keeps true-black terminal bg, inactive gets a subtle grey wash
set -g window-style 'fg=colour247,bg=colour233'
set -g window-active-style 'fg=terminal,bg=terminal'
set -g pane-border-indicators both
set -g pane-border-lines heavy
set -g pane-active-border-style 'fg=magenta,bg=terminal'
set -g pane-border-style 'fg=brightblack,bg=terminal'
